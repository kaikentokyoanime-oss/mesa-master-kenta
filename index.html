<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relojes para Fabula Ultima de 🔥 Master Kenta 🔥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ancient-blue: #00f2ff;
            --sheikah-gold: #e3c07d;
            --danger-red: #ff4d4d;
            --bg-dark: #0d1117;
            --panel-bg: rgba(20, 25, 35, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            /* Imagen de fondo completa con efecto fade to black */
            background-image: url('imagen-1.png');
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            color: #e0e0e0;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Overlay oscuro tipo "fade to black" para mejorar legibilidad */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(13,17,23,0.92));
            pointer-events: none;
            z-index: 0;
        }

        /* Asegurar que el contenido esté por encima del overlay */
        .hero-art, .main-container, .master-lock-container, #status-indicator {
            position: relative;
            z-index: 2;
        }

        .hero-art {
            position: relative;
            width: 100%;
            /* Eliminamos la imagen de fondo original y la altura fija que cortaba */
            background: none;
            border-bottom: 3px solid var(--sheikah-gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            min-height: 35vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        /* Eliminamos el degradado posterior que ya no es necesario */
        .hero-art::after {
            display: none;
        }

        .ancient-font { font-family: 'Cinzel', serif; }
        .tech-font { font-family: 'Special Elite', cursive; }

        .header-content {
            position: relative;
            bottom: auto;
            left: auto;
            right: auto;
            z-index: 10;
            text-align: center;
            padding: 1.5rem 1rem;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(3px);
            border-radius: 20px;
            margin-bottom: 2rem;
            width: 90%;
            max-width: 800px;
        }

        .header-title {
            background: linear-gradient(90deg, #ff4d4d, #f97316, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .main-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .clock-card {
            background: var(--panel-bg);
            border: 2px solid var(--sheikah-gold);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .clock-card:hover { transform: translateY(-5px); border-color: var(--ancient-blue); }

        .clock-svg { transform: rotate(-90deg); filter: drop-shadow(0 0 8px var(--ancient-blue)); }
        .progress-ring-circle { transition: stroke-dashoffset 0.5s ease-out; transform-origin: 50% 50%; }

        .btn-kenta {
            background: rgba(227, 192, 125, 0.1);
            border: 1px solid var(--sheikah-gold);
            color: var(--sheikah-gold);
            padding: 10px 20px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-kenta:hover { background: var(--sheikah-gold); color: black; box-shadow: 0 0 15px var(--sheikah-gold); }

        .master-lock-container {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            margin: 20px auto; padding: 10px 25px;
            background: rgba(0,0,0,0.6); border-radius: 50px;
            border: 1px solid var(--sheikah-gold); width: fit-content;
        }

        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #444; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--ancient-blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        .master-only { display: none; }
        .is-master .master-only { display: flex; }
        
        .segment-marker { stroke: #000; stroke-width: 2.5; }
        .icon-overlay { position: absolute; bottom: 10px; right: 15px; font-size: 1.5rem; opacity: 0.8; }

        #status-indicator {
            position: fixed; bottom: 15px; right: 15px; font-size: 11px;
            padding: 5px 10px; background: rgba(0,0,0,0.7); border-radius: 4px;
            color: #555; pointer-events: none; z-index: 100;
        }

        /* Pequeño ajuste responsivo para que el header no tape contenido en móviles */
        @media (max-width: 640px) {
            .hero-art {
                min-height: 28vh;
            }
            .header-title {
                font-size: 1.8rem;
            }
            .header-content {
                padding: 1rem;
                margin-bottom: 1rem;
            }
            body {
                background-attachment: scroll; /* mejor rendimiento en móviles */
            }
        }
    </style>
</head>
<body>

    <section class="hero-art">
        <div class="header-content">
            <h1 class="header-title ancient-font">Nexo de Relojes</h1>
            <p class="tech-font text-sheikah-gold tracking-[0.3em] text-xs">🔥 MASTER KENTA 🔥</p>
        </div>
    </section>

    <div class="main-container">
        <div class="master-lock-container">
            <span class="tech-font text-[10px] text-gray-400">VIAJERO 👤</span>
            <label class="switch">
                <input type="checkbox" id="master-toggle" onchange="toggleMasterMode()">
                <span class="slider"></span>
            </label>
            <span class="tech-font text-[10px] text-gray-400">MASTER ⚔️</span>
        </div>

        <div id="master-controls" class="master-only justify-center gap-4 mb-10">
            <button onclick="openModal()" class="btn-kenta tech-font">⚡ Crear Reloj</button>
            <button onclick="clearAllClocks()" class="btn-kenta tech-font border-red-500/50 text-red-500 hover:bg-red-500">🧹 Purgar Todo</button>
        </div>

        <main id="clocks-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 tech-font animate-pulse">Invocando el poder del Nexo...</div>
        </main>
    </div>

    <div id="status-indicator" class="tech-font">DESCONECTADO</div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#1a1f26] border-2 border-sheikah-gold p-8 rounded-xl w-full max-w-sm shadow-2xl">
            <h2 class="ancient-font text-sheikah-gold text-2xl mb-6">Nuevo Destino</h2>
            <label class="block text-[10px] uppercase mb-1 text-gray-500 font-bold">Descripción</label>
            <input type="text" id="clock-name" placeholder="Ej: La caída del Imperio" class="w-full bg-gray-900 border border-gray-700 p-3 mb-5 rounded text-white focus:border-cyan-400 outline-none">
            <label class="block text-[10px] uppercase mb-1 text-gray-500 font-bold">Alineación</label>
            <select id="clock-type" class="w-full bg-gray-900 border border-gray-700 p-3 mb-5 rounded text-white outline-none">
                <option value="goal">Meta (Azul/Beneficioso)</option>
                <option value="danger">Peligro (Rojo/Amenaza)</option>
            </select>
            <label class="block text-[10px] uppercase mb-1 text-gray-500 font-bold">Segmentos</label>
            <select id="clock-segments" class="w-full bg-gray-900 border border-gray-700 p-3 mb-8 rounded text-white outline-none">
                <option value="4">4 Pasos</option>
                <option value="6" selected>6 Pasos</option>
                <option value="8">8 Pasos</option>
                <option value="10">10 Pasos</option>
                <option value="12">12 Pasos</option>
            </select>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white p-3 rounded hover:bg-gray-700 transition-colors">Abortar</button>
                <button onclick="createClock()" class="flex-1 bg-cyan-700 text-white p-3 rounded hover:bg-cyan-600 transition-colors">Forjar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

       const firebaseConfig = {
  apiKey: "AIzaSyC2MQCC0XK_uaxa8_H1WH274bGyGEepPlU",
  authDomain: "relojes-kenta.firebaseapp.com",
  projectId: "relojes-kenta",
  storageBucket: "relojes-kenta.firebasestorage.app",
  messagingSenderId: "969538165559",
  appId: "1:969538165559:web:2770df616a21bf8acfd8b2",
  measurementId: "G-HPE1WTY9M8"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const appId = "relojes-kenta-app"; // Puedes poner el nombre que quieras aquí
        
        let clocks = [];
        let isMaster = false;
        let currentUser = null;
        const MASTER_PIN = "1234";

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Error de autenticación:", err);
                document.getElementById('status-indicator').innerText = "ERROR DE IDENTIDAD";
            }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                console.log("Sesión iniciada:", user.uid);
                startListening();
            }
        });

        function startListening() {
            if (!currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'clocks');
            onSnapshot(colRef, (snapshot) => {
                clocks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderClocks();
                document.getElementById('status-indicator').innerText = "VINCULADO AL NEXO";
                document.getElementById('status-indicator').style.color = "#00f2ff";
            }, (err) => {
                console.error("Error en tiempo real:", err);
                document.getElementById('status-indicator').innerText = "ERROR DE PERMISOS";
            });
        }

        window.toggleMasterMode = function() {
            const toggle = document.getElementById('master-toggle');
            if (toggle.checked) {
                const pin = prompt("Introduce la runa de acceso (PIN):");
                if (pin === MASTER_PIN) {
                    isMaster = true;
                    document.body.classList.add('is-master');
                    localStorage.setItem('kenta_master_mode', 'true');
                } else {
                    toggle.checked = false;
                    alert("Runa inválida.");
                }
            } else {
                isMaster = false;
                document.body.classList.remove('is-master');
                localStorage.setItem('kenta_master_mode', 'false');
            }
            renderClocks();
        };

        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        window.createClock = async function() {
            if (!isMaster || !currentUser) return;
            const name = document.getElementById('clock-name').value || "Misión Desconocida";
            const type = document.getElementById('clock-type').value;
            const segments = parseInt(document.getElementById('clock-segments').value);
            
            const newId = Date.now().toString();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'clocks', newId);
            
            try {
                await setDoc(docRef, {
                    name,
                    type,
                    segments,
                    current: 0,
                    flavor: ['⚔️', '🔥', '💎', '🏺', '📜', '🧭'][Math.floor(Math.random()*6)],
                    timestamp: serverTimestamp()
                });
                closeModal();
                document.getElementById('clock-name').value = "";
            } catch (e) {
                console.error("Error al crear:", e);
            }
        };

        window.adjustProgress = async function(id, amount) {
            if (!isMaster || !currentUser) return;
            const clock = clocks.find(c => c.id === id);
            if (!clock) return;

            const nextValue = Math.min(Math.max(0, clock.current + amount), clock.segments);
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'clocks', id);
            
            try {
                await updateDoc(docRef, { current: nextValue });
            } catch (e) {
                console.error("Error al actualizar:", e);
            }
        };

        window.deleteClock = async function(id) {
            if (!isMaster || !currentUser) return;
            if (confirm("¿Desvanecer este reloj?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clocks', id));
                } catch (e) {
                    console.error("Error al borrar:", e);
                }
            }
        };

        window.clearAllClocks = async function() {
            if (!isMaster || !currentUser) return;
            if (confirm("¿Borrar todos los relojes?")) {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'clocks');
                const querySnap = await getDocs(colRef);
                querySnap.forEach(async (d) => {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'clocks', d.id));
                });
            }
        };

        window.renderClocks = function() {
            const container = document.getElementById('clocks-container');
            container.innerHTML = "";

            if (clocks.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 opacity-30 tech-font border-2 border-dashed border-gray-700 rounded-xl">No hay destinos activos.</div>`;
            }

            const sorted = [...clocks].sort((a, b) => {
                const timeA = a.timestamp?.seconds || 0;
                const timeB = b.timestamp?.seconds || 0;
                return timeA - timeB;
            });

            sorted.forEach(clock => {
                const radius = 45;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (clock.current / clock.segments) * circumference;
                const color = clock.type === 'goal' ? '#00f2ff' : '#ff4d4d';
                
                let markers = "";
                for(let i = 0; i < clock.segments; i++) {
                    const angle = (i * 360 / clock.segments - 90) * (Math.PI / 180);
                    const x2 = 50 + 50 * Math.cos(angle);
                    const y2 = 50 + 50 * Math.sin(angle);
                    markers += `<line x1="50" y1="50" x2="${x2}" y2="${y2}" class="segment-marker" />`;
                }

                const card = document.createElement('div');
                card.className = `clock-card flex flex-col items-center`;
                card.innerHTML = `
                    <div class="w-full flex justify-between items-center mb-4">
                        <span class="tech-font text-[9px] tracking-widest ${clock.type === 'goal' ? 'text-cyan-400' : 'text-red-500'} font-bold">
                            ${clock.type === 'goal' ? '✨ OBJETIVO' : '💀 AMENAZA'}
                        </span>
                        ${isMaster ? `<button onclick="deleteClock('${clock.id}')" class="text-gray-600 hover:text-red-500 text-sm">ELIMINAR</button>` : '<span></span>'}
                    </div>
                    <h3 class="ancient-font text-center text-lg mb-6 h-12 flex items-center text-white leading-tight">${clock.name}</h3>
                    <div class="relative mb-6">
                        <svg class="clock-svg" width="140" height="140" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="rgba(0,0,0,0.5)" stroke="#222" stroke-width="6" />
                            <circle class="progress-ring-circle" cx="50" cy="50" r="45" fill="transparent" stroke="${color}" stroke-width="7" 
                                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" stroke-linecap="round" />
                            ${markers}
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="tech-font text-2xl font-bold" style="color: ${color}">${clock.current}/${clock.segments}</span>
                        </div>
                    </div>
                    <div class="flex gap-3 w-full ${isMaster ? '' : 'hidden'}">
                        <button onclick="adjustProgress('${clock.id}', -1)" class="btn-kenta flex-1 font-bold text-xl">-</button>
                        <button onclick="adjustProgress('${clock.id}', 1)" class="btn-kenta flex-1 font-bold text-xl">+</button>
                    </div>
                    <div class="icon-overlay opacity-20">${clock.flavor}</div>
                `;
                container.appendChild(card);
            });
        };

        // Restaurar modo master visualmente de inmediato
        if (localStorage.getItem('kenta_master_mode') === 'true') {
            isMaster = true;
            document.getElementById('master-toggle').checked = true;
            document.body.classList.add('is-master');
        }

        initAuth();
    </script>
</body>
</html>
