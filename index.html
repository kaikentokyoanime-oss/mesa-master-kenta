<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relojes para Fabula Ultima de 🔥 Master Kenta 🔥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ancient-blue: #00f2ff;
            --sheikah-gold: #e3c07d;
            --danger-red: #ff4d4d;
            --bg-dark: #0d1117;
            --panel-bg: rgba(13, 17, 23, 0.85);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Imagen de fondo principal */
        .bg-image-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('imagen-1.png');
            background-size: cover;
            background-position: center;
            filter: brightness(0.3) saturate(0.8) blur(2px);
        }

        /* Gradiente para mejorar legibilidad sobre el fondo */
        .bg-gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, transparent, var(--bg-dark));
        }

        .ancient-font { font-family: 'Cinzel', serif; }
        .tech-font { font-family: 'Special Elite', cursive; }

        .header-title {
            text-align: center;
            background: linear-gradient(90deg, #ff4d4d, #f97316, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(249, 115, 22, 0.5);
            font-size: 2rem;
            margin-bottom: 20px;
            padding-top: 20px;
        }

        .clock-card {
            background: var(--panel-bg);
            border: 2px solid var(--sheikah-gold);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            margin-bottom: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .clock-card:hover {
            transform: translateY(-5px);
        }

        .clock-card::before {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 1px solid var(--ancient-blue);
            border-radius: 20px;
            pointer-events: none;
            opacity: 0.2;
        }

        .clock-svg {
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 8px var(--ancient-blue));
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform-origin: 50% 50%;
        }

        .btn-kenta {
            background: rgba(227, 192, 125, 0.15);
            border: 1px solid var(--sheikah-gold);
            color: var(--sheikah-gold);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .btn-kenta:hover {
            background: rgba(227, 192, 125, 0.3);
            box-shadow: 0 0 10px var(--sheikah-gold);
        }

        .btn-kenta:active {
            background: var(--sheikah-gold);
            color: black;
        }

        .segment-marker {
            stroke: #000;
            stroke-width: 2.5;
        }

        .icon-overlay {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 1.5rem;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px black);
        }

        .fire-bg {
            position: fixed;
            top: 10px; right: 10px;
            z-index: 10;
            opacity: 0.5;
            font-size: 2rem;
        }

        .master-lock-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 12px 25px;
            background: rgba(0,0,0,0.6);
            border-radius: 50px;
            border: 1px solid var(--sheikah-gold);
            max-width: fit-content;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(5px);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--ancient-blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        .master-only { display: none; }
        .is-master .master-only { display: block; }
        .is-master #master-controls { display: flex; }

        /* Ajustes para que el texto sea más legible sobre fondo complejo */
        h3 {
            text-shadow: 2px 2px 4px rgba(0,0,0,1);
        }
    </style>
</head>
<body>

    <div class="bg-image-overlay"></div>
    <div class="bg-gradient-overlay"></div>
    <div class="fire-bg">🔥</div>

    <header class="mb-8 relative">
        <h1 class="header-title ancient-font">Relojes para Fabula Ultima<br>de 🔥 Master Kenta 🔥</h1>
        
        <!-- Master Lock System -->
        <div class="master-lock-container">
            <span class="tech-font text-[10px] md:text-xs text-white" id="lock-label">MODO JUGADOR 👤</span>
            <label class="switch">
                <input type="checkbox" id="master-toggle" onchange="toggleMasterMode()">
                <span class="slider"></span>
            </label>
            <span class="tech-font text-[10px] md:text-xs text-white">MODO MASTER ⚔️</span>
        </div>

        <div class="flex flex-wrap gap-3 justify-center master-only" id="master-controls">
            <button onclick="openModal()" class="btn-kenta tech-font">⚡ Nuevo Proyecto</button>
            <button onclick="clearAllClocks()" class="btn-kenta tech-font" style="border-color: #ff4d4d; color: #ff4d4d;">🧹 Limpiar Todo</button>
        </div>
    </header>

    <main id="clocks-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto px-4 pb-20">
        <!-- Relojes inyectados -->
    </main>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#1a1f26] border-2 border-sheikah-gold p-6 rounded-xl w-full max-w-sm shadow-2xl">
            <h2 class="ancient-font text-sheikah-gold text-xl mb-4">Nueva Receta / Proyecto</h2>
            
            <label class="block text-xs uppercase mb-1 text-gray-400">Nombre del Reloj</label>
            <input type="text" id="clock-name" placeholder="Ej: Escapar de Impel Down" class="w-full bg-gray-900 border border-gray-700 p-2 mb-4 rounded text-white outline-none focus:border-cyan-400">
            
            <label class="block text-xs uppercase mb-1 text-gray-400">Tipo de Reloj</label>
            <select id="clock-type" class="w-full bg-gray-900 border border-gray-700 p-2 mb-4 rounded text-white outline-none">
                <option value="goal">Meta (Azul Ancestral)</option>
                <option value="danger">Peligro (Rojo Akainu)</option>
            </select>

            <label class="block text-xs uppercase mb-1 text-gray-400">Segmentos</label>
            <select id="clock-segments" class="w-full bg-gray-900 border border-gray-700 p-2 mb-6 rounded text-white outline-none">
                <option value="4">4 Segmentos</option>
                <option value="6">6 Segmentos</option>
                <option value="8">8 Segmentos</option>
                <option value="10">10 Segmentos</option>
                <option value="12">12 Segmentos</option>
            </select>

            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white p-2 rounded hover:bg-gray-700">Cancelar</button>
                <button onclick="createClock()" class="flex-1 bg-cyan-700 text-white p-2 rounded hover:bg-cyan-600">Forjar Reloj</button>
            </div>
        </div>
    </div>

    <script>
        let clocks = [];
        let isMaster = false;
        const MASTER_PIN = "1234";

        window.onload = () => {
            const savedClocks = localStorage.getItem('kenta_clocks');
            const savedMasterStatus = localStorage.getItem('kenta_is_master') === 'true';
            
            if (savedClocks) {
                clocks = JSON.parse(savedClocks);
            } else {
                clocks.push({
                    id: 1,
                    name: "Cocinar Curry Gran Pirata",
                    type: "goal",
                    segments: 6,
                    current: 2,
                    flavor: "🍳"
                });
                saveToLocalStorage();
            }

            if (savedMasterStatus) {
                isMaster = true;
                document.getElementById('master-toggle').checked = true;
                document.body.classList.add('is-master');
            }
            
            renderClocks();
        };

        function toggleMasterMode() {
            const toggle = document.getElementById('master-toggle');
            if (toggle.checked) {
                const pin = prompt("Introduce el PIN de Master Kenta para editar:");
                if (pin === MASTER_PIN) {
                    isMaster = true;
                    document.body.classList.add('is-master');
                    localStorage.setItem('kenta_is_master', 'true');
                } else {
                    toggle.checked = false;
                    alert("PIN incorrecto.");
                }
            } else {
                isMaster = false;
                document.body.classList.remove('is-master');
                localStorage.setItem('kenta_is_master', 'false');
            }
            renderClocks();
        }

        function saveToLocalStorage() {
            localStorage.setItem('kenta_clocks', JSON.stringify(clocks));
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function createClock() {
            if (!isMaster) return;
            const name = document.getElementById('clock-name').value || "Sin Nombre";
            const type = document.getElementById('clock-type').value;
            const segments = parseInt(document.getElementById('clock-segments').value);
            
            const newClock = {
                id: Date.now(),
                name,
                type,
                segments,
                current: 0,
                flavor: getFlavorIcon()
            };

            clocks.push(newClock);
            saveToLocalStorage();
            renderClocks();
            closeModal();
            document.getElementById('clock-name').value = "";
        }

        function getFlavorIcon() {
            const icons = ['⚓', '🍖', '🧭', '🤖', '🍶', '⚔️', '🍳', '⌛', '🔥', '🏴‍☠️', '💎', '🏺', '📜'];
            return icons[Math.floor(Math.random() * icons.length)];
        }

        function adjustProgress(id, amount) {
            if (!isMaster) return;
            const clock = clocks.find(c => c.id === id);
            if (clock) {
                clock.current = Math.min(Math.max(0, clock.current + amount), clock.segments);
                saveToLocalStorage();
                renderClocks();
            }
        }

        function deleteClock(id) {
            if (!isMaster) return;
            clocks = clocks.filter(c => c.id !== id);
            saveToLocalStorage();
            renderClocks();
        }

        function clearAllClocks() {
            if (!isMaster) return;
            if(confirm("¿Borrar todos los relojes activos?")) {
                clocks = [];
                saveToLocalStorage();
                renderClocks();
            }
        }

        function renderClocks() {
            const container = document.getElementById('clocks-container');
            container.innerHTML = "";

            if (clocks.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center p-20 opacity-70 tech-font bg-black/40 rounded-xl border border-dashed border-gray-600">No hay proyectos forjándose en este momento.</div>`;
            }

            clocks.forEach(clock => {
                const radius = 45;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (clock.current / clock.segments) * circumference;
                const color = clock.type === 'goal' ? '#00f2ff' : '#ff4d4d';
                
                const card = document.createElement('div');
                card.className = `clock-card flex flex-col items-center`;
                
                let markers = "";
                for(let i = 0; i < clock.segments; i++) {
                    const angle = (i * 360 / clock.segments) * (Math.PI / 180);
                    const x2 = 50 + 50 * Math.cos(angle);
                    const y2 = 50 + 50 * Math.sin(angle);
                    markers += `<line x1="50" y1="50" x2="${x2}" y2="${y2}" class="segment-marker" />`;
                }

                card.innerHTML = `
                    <div class="w-full flex justify-between items-start mb-2">
                        <span class="tech-font text-sheikah-gold text-[10px] uppercase tracking-widest">${clock.type === 'goal' ? '✨ PROYECTO ✨' : '💀 PELIGRO 💀'}</span>
                        ${isMaster ? `<button onclick="deleteClock(${clock.id})" class="text-gray-400 hover:text-red-500 transition-colors text-xl leading-none">&times;</button>` : '<span></span>'}
                    </div>
                    
                    <h3 class="ancient-font text-center text-lg mb-6 text-white leading-tight min-h-[3rem] flex items-center px-2">${clock.name}</h3>

                    <div class="relative mb-6">
                        <svg class="clock-svg" width="160" height="160" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="rgba(0,0,0,0.6)" stroke="#333" stroke-width="8" />
                            <circle class="progress-ring-circle" 
                                cx="50" cy="50" r="45" 
                                fill="transparent" 
                                stroke="${color}" 
                                stroke-width="8"
                                stroke-dasharray="${circumference}" 
                                stroke-dashoffset="${offset}"
                                stroke-linecap="round" />
                            ${markers}
                            <circle cx="50" cy="50" r="4" fill="${color}" />
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="tech-font text-3xl font-bold" style="color: ${color}; text-shadow: 0 0 10px rgba(0,0,0,0.8);">${clock.current}/${clock.segments}</span>
                        </div>
                    </div>

                    <div class="flex gap-4 w-full justify-center mt-2 ${isMaster ? '' : 'hidden'}">
                        <button onclick="adjustProgress(${clock.id}, -1)" class="btn-kenta flex-1 font-bold text-2xl">-</button>
                        <button onclick="adjustProgress(${clock.id}, 1)" class="btn-kenta flex-1 font-bold text-2xl">+</button>
                    </div>

                    <div class="icon-overlay">${clock.flavor}</div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
