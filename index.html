<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relojes para Fabula Ultima de 🔥 Master Kenta 🔥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ancient-blue: #00f2ff;
            --sheikah-gold: #e3c07d;
            --danger-red: #ff4d4d;
            --bg-dark: #0d1117;
            --panel-bg: rgba(20, 25, 35, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Hero Art Section: Aquí se ven todos los detalles */
        .hero-art {
            position: relative;
            width: 100%;
            height: 45vh; /* Ocupa casi la mitad de la pantalla inicial */
            background-image: url('imagen-1.png');
            background-size: cover;
            background-position: center 20%;
            border-bottom: 3px solid var(--sheikah-gold);
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        /* Degradado para transición suave al contenido */
        .hero-art::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            background: linear-gradient(to top, var(--bg-dark), transparent);
        }

        .ancient-font { font-family: 'Cinzel', serif; }
        .tech-font { font-family: 'Special Elite', cursive; }

        .header-content {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            z-index: 10;
            text-align: center;
        }

        .header-title {
            background: linear-gradient(90deg, #ff4d4d, #f97316, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .main-container {
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }

        .clock-card {
            background: var(--panel-bg);
            border: 2px solid var(--sheikah-gold);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            transition: all 0.3s ease;
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        .clock-card:hover {
            transform: scale(1.02);
            border-color: var(--ancient-blue);
        }

        .clock-svg {
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 5px var(--ancient-blue));
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: 50% 50%;
        }

        .btn-kenta {
            background: rgba(227, 192, 125, 0.1);
            border: 1px solid var(--sheikah-gold);
            color: var(--sheikah-gold);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-kenta:hover:not(:disabled) {
            background: var(--sheikah-gold);
            color: black;
        }

        .master-lock-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 20px auto;
            padding: 8px 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            border: 1px solid rgba(227, 192, 125, 0.3);
            width: fit-content;
        }

        /* Switch styling */
        .switch { position: relative; display: inline-block; width: 44px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--ancient-blue); }
        input:checked + .slider:before { transform: translateX(24px); }

        .master-only { display: none; }
        .is-master .master-only { display: flex; }

        .segment-marker { stroke: var(--bg-dark); stroke-width: 2; }
    </style>
</head>
<body>

    <section class="hero-art">
        <div class="header-content">
            <h1 class="header-title ancient-font">Relojes de Fabula Ultima</h1>
            <p class="tech-font text-sheikah-gold tracking-widest text-sm">🔥 MASTER KENTA EDITION 🔥</p>
        </div>
    </section>

    <div class="main-container">
        <!-- Master Lock System -->
        <div class="master-lock-container">
            <span class="tech-font text-[10px] text-gray-400">JUGADOR</span>
            <label class="switch">
                <input type="checkbox" id="master-toggle" onchange="toggleMasterMode()">
                <span class="slider"></span>
            </label>
            <span class="tech-font text-[10px] text-gray-400">MASTER</span>
        </div>

        <div id="master-controls" class="master-only justify-center gap-4 mb-8">
            <button onclick="openModal()" class="btn-kenta tech-font">⚡ Nuevo Proyecto</button>
            <button onclick="clearAllClocks()" class="btn-kenta tech-font text-red-400 border-red-400/50">🧹 Borrar Todo</button>
        </div>

        <main id="clocks-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Relojes inyectados -->
        </main>
    </div>

    <!-- Modal para crear relojes -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#1a1f26] border-2 border-sheikah-gold p-6 rounded-xl w-full max-w-sm">
            <h2 class="ancient-font text-sheikah-gold text-xl mb-4">Nueva Receta</h2>
            <input type="text" id="clock-name" placeholder="Nombre del Reloj" class="w-full bg-gray-900 border border-gray-700 p-2 mb-4 rounded text-white outline-none">
            <select id="clock-type" class="w-full bg-gray-900 border border-gray-700 p-2 mb-4 rounded text-white outline-none">
                <option value="goal">Meta (Azul)</option>
                <option value="danger">Peligro (Rojo)</option>
            </select>
            <select id="clock-segments" class="w-full bg-gray-900 border border-gray-700 p-2 mb-6 rounded text-white">
                <option value="4">4 Segmentos</option>
                <option value="6" selected>6 Segmentos</option>
                <option value="8">8 Segmentos</option>
                <option value="10">10 Segmentos</option>
                <option value="12">12 Segmentos</option>
            </select>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white p-2 rounded">Cerrar</button>
                <button onclick="createClock()" class="flex-1 bg-cyan-700 text-white p-2 rounded">Crear</button>
            </div>
        </div>
    </div>

    <script>
        let clocks = [];
        let isMaster = false;
        const MASTER_PIN = "1234";

        window.onload = () => {
            const savedClocks = localStorage.getItem('kenta_clocks');
            const savedMasterStatus = localStorage.getItem('kenta_is_master') === 'true';
            
            if (savedClocks) {
                clocks = JSON.parse(savedClocks);
            } else {
                clocks.push({ id: 1, name: "Cocinar Curry Gran Pirata", type: "goal", segments: 6, current: 2, flavor: "🍳" });
                saveToLocalStorage();
            }

            if (savedMasterStatus) {
                isMaster = true;
                document.getElementById('master-toggle').checked = true;
                document.body.classList.add('is-master');
            }
            renderClocks();
        };

        function toggleMasterMode() {
            const toggle = document.getElementById('master-toggle');
            if (toggle.checked) {
                const pin = prompt("PIN de Master:");
                if (pin === MASTER_PIN) {
                    isMaster = true;
                    document.body.classList.add('is-master');
                    localStorage.setItem('kenta_is_master', 'true');
                } else {
                    toggle.checked = false;
                }
            } else {
                isMaster = false;
                document.body.classList.remove('is-master');
                localStorage.setItem('kenta_is_master', 'false');
            }
            renderClocks();
        }

        function saveToLocalStorage() { localStorage.setItem('kenta_clocks', JSON.stringify(clocks)); }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function createClock() {
            const name = document.getElementById('clock-name').value || "Proyecto";
            const type = document.getElementById('clock-type').value;
            const segments = parseInt(document.getElementById('clock-segments').value);
            clocks.push({ id: Date.now(), name, type, segments, current: 0, flavor: '📜' });
            saveToLocalStorage();
            renderClocks();
            closeModal();
        }

        function adjustProgress(id, amount) {
            const clock = clocks.find(c => c.id === id);
            if (clock) {
                clock.current = Math.min(Math.max(0, clock.current + amount), clock.segments);
                saveToLocalStorage();
                renderClocks();
            }
        }

        function deleteClock(id) {
            if(confirm("¿Eliminar este reloj?")) {
                clocks = clocks.filter(c => c.id !== id);
                saveToLocalStorage();
                renderClocks();
            }
        }

        function clearAllClocks() {
            if(confirm("¿Borrar todos?")) {
                clocks = [];
                saveToLocalStorage();
                renderClocks();
            }
        }

        function renderClocks() {
            const container = document.getElementById('clocks-container');
            container.innerHTML = "";
            
            clocks.forEach(clock => {
                const r = 45;
                const circ = 2 * Math.PI * r;
                const offset = circ - (clock.current / clock.segments) * circ;
                const color = clock.type === 'goal' ? '#00f2ff' : '#ff4d4d';
                
                let markers = "";
                for(let i = 0; i < clock.segments; i++) {
                    const angle = (i * 360 / clock.segments - 90) * (Math.PI / 180);
                    const x2 = 50 + 50 * Math.cos(angle);
                    const y2 = 50 + 50 * Math.sin(angle);
                    markers += `<line x1="50" y1="50" x2="${x2}" y2="${y2}" class="segment-marker" />`;
                }

                const card = document.createElement('div');
                card.className = "clock-card flex flex-col items-center";
                card.innerHTML = `
                    <div class="w-full flex justify-between mb-2">
                        <span class="text-[9px] tech-font text-sheikah-gold">${clock.type.toUpperCase()}</span>
                        ${isMaster ? `<button onclick="deleteClock(${clock.id})" class="text-xs text-gray-500 hover:text-red-500">ELIMINAR</button>` : ''}
                    </div>
                    <h3 class="ancient-font text-center text-md mb-4 h-12 flex items-center text-white">${clock.name}</h3>
                    <div class="relative mb-4">
                        <svg class="clock-svg" width="120" height="120" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="#111" stroke="#333" stroke-width="6" />
                            <circle class="progress-ring-circle" cx="50" cy="50" r="45" fill="transparent" stroke="${color}" stroke-width="7" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" />
                            ${markers}
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="tech-font text-xl" style="color: ${color}">${clock.current}/${clock.segments}</span>
                        </div>
                    </div>
                    <div class="flex gap-2 w-full ${isMaster ? '' : 'hidden'}">
                        <button onclick="adjustProgress(${clock.id}, -1)" class="btn-kenta flex-1">-</button>
                        <button onclick="adjustProgress(${clock.id}, 1)" class="btn-kenta flex-1">+</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
