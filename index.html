<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relojes para Fabula Ultima de 🔥 Master Kenta 🔥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Quicksand:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --ancient-blue: #00f2ff;
            --sheikah-gold: #e3c07d;
            --danger-red: #ff4d4d;
            --bg-dark: #0d1117;
            --panel-bg: rgba(20, 25, 35, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
            color: #e0e0e0;
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }

        .ancient-font { font-family: 'Cinzel', serif; }
        .tech-font { font-family: 'Special Elite', cursive; }

        .header-title {
            text-align: center;
            background: linear-gradient(90deg, #ff4d4d, #f97316, #ff4d4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(249, 115, 22, 0.3);
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--sheikah-gold);
            padding-bottom: 10px;
        }

        .clock-card {
            background: var(--panel-bg);
            border: 2px solid var(--sheikah-gold);
            border-radius: 15px;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            transition: all 0.3s ease;
            margin-bottom: 20px;
            padding: 15px;
        }

        .clock-card::before {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 1px solid var(--ancient-blue);
            border-radius: 20px;
            pointer-events: none;
            opacity: 0.3;
        }

        .clock-svg {
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 5px var(--ancient-blue));
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.35s;
            transform-origin: 50% 50%;
        }

        .btn-kenta {
            background: rgba(227, 192, 125, 0.1);
            border: 1px solid var(--sheikah-gold);
            color: var(--sheikah-gold);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .btn-kenta:active {
            background: var(--sheikah-gold);
            color: black;
        }

        .segment-marker {
            stroke: var(--bg-dark);
            stroke-width: 2;
        }

        .icon-overlay {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .clock-type-goal { --clock-color: var(--ancient-blue); }
        .clock-type-danger { --clock-color: var(--danger-red); }

        .fire-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.05;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="fire-bg">🔥</div>

    <header class="mb-6">
        <h1 class="header-title ancient-font">Relojes para Fabula Ultima<br>de 🔥 Master Kenta 🔥</h1>
        
        <div class="flex flex-wrap gap-2 justify-center">
            <button onclick="openModal()" class="btn-kenta tech-font">⚡ Crear Nuevo Proyecto</button>
            <button onclick="clearAllClocks()" class="btn-kenta tech-font" style="border-color: #ff4d4d; color: #ff4d4d;">🧹 Limpiar Todo</button>
        </div>
    </header>

    <main id="clocks-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Los relojes se inyectan aquí -->
    </main>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-[#1a1f26] border-2 border-sheikah-gold p-6 rounded-xl w-full max-w-sm">
            <h2 class="ancient-font text-sheikah-gold text-xl mb-4">Nueva Receta/Proyecto</h2>
            
            <label class="block text-xs uppercase mb-1 text-gray-400">Nombre del Reloj</label>
            <input type="text" id="clock-name" placeholder="Ej: Escapar de Impel Down" class="w-full bg-gray-900 border border-gray-700 p-2 mb-4 rounded text-white outline-none focus:border-cyan-400">
            
            <label class="block text-xs uppercase mb-1 text-gray-400">Tipo de Reloj</label>
            <select id="clock-type" class="w-full bg-gray-900 border border-gray-700 p-2 mb-4 rounded text-white outline-none">
                <option value="goal">Meta (Azul Ancestral)</option>
                <option value="danger">Peligro (Rojo Akainu)</option>
            </select>

            <label class="block text-xs uppercase mb-1 text-gray-400">Segmentos</label>
            <select id="clock-segments" class="w-full bg-gray-900 border border-gray-700 p-2 mb-6 rounded text-white outline-none">
                <option value="4">4 Segmentos</option>
                <option value="6">6 Segmentos</option>
                <option value="8">8 Segmentos</option>
                <option value="10">10 Segmentos</option>
                <option value="12">12 Segmentos</option>
            </select>

            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-800 text-white p-2 rounded">Cancelar</button>
                <button onclick="createClock()" class="flex-1 bg-cyan-600 text-white p-2 rounded">Forjar Reloj</button>
            </div>
        </div>
    </div>

    <script>
        let clocks = [];

        // Cargar datos al iniciar
        window.onload = () => {
            const savedClocks = localStorage.getItem('kenta_clocks');
            if (savedClocks) {
                clocks = JSON.parse(savedClocks);
                renderClocks();
            } else {
                // Mock inicial solo si no hay nada guardado
                clocks.push({
                    id: 1,
                    name: "Cocinar Curry Gran Pirata",
                    type: "goal",
                    segments: 6,
                    current: 2,
                    flavor: "🍳"
                });
                saveToLocalStorage();
                renderClocks();
            }
        };

        function saveToLocalStorage() {
            localStorage.setItem('kenta_clocks', JSON.stringify(clocks));
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function createClock() {
            const name = document.getElementById('clock-name').value || "Sin Nombre";
            const type = document.getElementById('clock-type').value;
            const segments = parseInt(document.getElementById('clock-segments').value);
            
            const newClock = {
                id: Date.now(),
                name,
                type,
                segments,
                current: 0,
                flavor: getFlavorIcon()
            };

            clocks.push(newClock);
            saveToLocalStorage();
            renderClocks();
            closeModal();
            document.getElementById('clock-name').value = "";
        }

        function getFlavorIcon() {
            const icons = ['⚓', '🍖', '🧭', '🤖', '🍶', '⚔️', '🍳', '⌛', '🔥', '🏴‍☠️'];
            return icons[Math.floor(Math.random() * icons.length)];
        }

        function adjustProgress(id, amount) {
            const clock = clocks.find(c => c.id === id);
            if (clock) {
                clock.current = Math.min(Math.max(0, clock.current + amount), clock.segments);
                saveToLocalStorage();
                renderClocks();
            }
        }

        function deleteClock(id) {
            clocks = clocks.filter(c => c.id !== id);
            saveToLocalStorage();
            renderClocks();
        }

        function clearAllClocks() {
            if(confirm("¿Seguro que quieres borrar todos los relojes de la aventura?")) {
                clocks = [];
                saveToLocalStorage();
                renderClocks();
            }
        }

        function renderClocks() {
            const container = document.getElementById('clocks-container');
            container.innerHTML = "";

            if (clocks.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center p-10 opacity-50 tech-font">No hay relojes activos en este momento, Master.</div>`;
            }

            clocks.forEach(clock => {
                const radius = 45;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (clock.current / clock.segments) * circumference;
                const color = clock.type === 'goal' ? '#00f2ff' : '#ff4d4d';
                
                const card = document.createElement('div');
                card.className = `clock-card clock-type-${clock.type} flex flex-col items-center`;
                
                let markers = "";
                for(let i = 0; i < clock.segments; i++) {
                    const angle = (i * 360 / clock.segments) * (Math.PI / 180);
                    const x2 = 50 + 50 * Math.cos(angle);
                    const y2 = 50 + 50 * Math.sin(angle);
                    markers += `<line x1="50" y1="50" x2="${x2}" y2="${y2}" class="segment-marker" />`;
                }

                card.innerHTML = `
                    <div class="w-full flex justify-between items-start mb-2">
                        <span class="tech-font text-sheikah-gold text-sm uppercase">${clock.type === 'goal' ? 'PROYECTO' : 'PELIGRO'}</span>
                        <button onclick="deleteClock(${clock.id})" class="text-gray-500 hover:text-red-500 transition-colors">×</button>
                    </div>
                    
                    <h3 class="ancient-font text-center text-lg mb-4 text-white leading-tight">${clock.name}</h3>

                    <div class="relative mb-4">
                        <svg class="clock-svg" width="160" height="160" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="#111" stroke="#333" stroke-width="8" />
                            <circle class="progress-ring-circle" 
                                cx="50" cy="50" r="45" 
                                fill="transparent" 
                                stroke="${color}" 
                                stroke-width="8"
                                stroke-dasharray="${circumference}" 
                                stroke-dashoffset="${offset}"
                                stroke-linecap="round" />
                            ${markers}
                            <circle cx="50" cy="50" r="4" fill="${color}" />
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="tech-font text-2xl" style="color: ${color}">${clock.current}/${clock.segments}</span>
                        </div>
                    </div>

                    <div class="flex gap-4 w-full justify-center mt-2">
                        <button onclick="adjustProgress(${clock.id}, -1)" class="btn-kenta flex-1 font-bold text-xl">-</button>
                        <button onclick="adjustProgress(${clock.id}, 1)" class="btn-kenta flex-1 font-bold text-xl">+</button>
                    </div>

                    <div class="icon-overlay">${clock.flavor}</div>
                `;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
